"$schema" = 'https://starship.rs/config-schema.json'

format = """$os$username$hostname in $directory$git_branch$git_status$bun$c$cmake$cobol$crystal$dart$deno$dotnet$elixir$elm$erlang$fennel$golang$gradle$guix_shell$haskell$haxe$helm$java$julia$kotlin$lua$maven$meson$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pixi$pulumi$purescript$python$raku$red$rlang$ruby$rust$scala$singularity$solidity$spack$swift$terraform$typst$vagrant$vlang$xmake$zig$aws$gcloud$openstack$azure$conda$direnv$docker_context$kubernetes$package$buf$nix_shell$cmd_duration
$character"""



[character]
success_symbol = '[❯](bold #FFF0C4)'
error_symbol = '[❯](bold #E05C5C)'

[os]
style = '#FFF0C4'
disabled = false

[username]
style_user = '#C4724A'
format = '[$user]($style)[@](fg:#C4724A)'
show_always = true

[git_status]
modified = '[✎](fg:#E05C5C)'
untracked = '[?](fg:#D4A84B)'

[cmd_duration]
style = '#D4A84B'



[aws]
symbol = " "
style = '#7BAFD4'
[azure]
symbol = " "
style = '#7BAFD4'
