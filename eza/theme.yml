# Restricted 3-color palette:
#   #E05C5C — directories, errors, broken, execute bits
#   #E8A87C — symlinks, executables, accented metadata, git changes
#   #FFF0C4 — regular files and all neutral metadata

filekinds:
  directory:
    foreground: "#E05C5C"
    is_bold: true
  symlink:
    foreground: "#E8A87C"
    is_italic: true
  executable_file:
    foreground: "#E8A87C"
    is_bold: true
  socket:
    foreground: "#E8A87C"
  pipe:
    foreground: "#E8A87C"
  character_device:
    foreground: "#E8A87C"
    is_bold: true
  block_device:
    foreground: "#E8A87C"
    is_bold: true
  broken_symlink:
    foreground: "#E05C5C"
    is_bold: true
  missing_file:
    foreground: "#E05C5C"
    is_dimmed: true
  special_file:
    foreground: "#FFF0C4"

file_type:
  image:
    foreground: "#E8A87C"
  video:
    foreground: "#E8A87C"
    is_bold: true
  music:
    foreground: "#E8A87C"
  crypto:
    foreground: "#E05C5C"
    is_bold: true
  document:
    foreground: "#FFF0C4"
  compressed:
    foreground: "#E8A87C"
    is_bold: true
  temp:
    foreground: "#FFF0C4"
    is_dimmed: true
  compiled:
    foreground: "#FFF0C4"
    is_dimmed: true
  build:
    foreground: "#E8A87C"
  source:
    foreground: "#FFF0C4"

perms:
  user_read:
    foreground: "#FFF0C4"
    is_bold: true
  user_write:
    foreground: "#E8A87C"
    is_bold: true
  user_execute_file:
    foreground: "#E05C5C"
    is_bold: true
  user_execute_other:
    foreground: "#E05C5C"
  group_read:
    foreground: "#FFF0C4"
    is_dimmed: true
  group_write:
    foreground: "#E8A87C"
    is_dimmed: true
  group_execute:
    foreground: "#E05C5C"
    is_dimmed: true
  other_read:
    foreground: "#FFF0C4"
    is_dimmed: true
  other_write:
    foreground: "#E8A87C"
    is_dimmed: true
  other_execute:
    foreground: "#E05C5C"
    is_dimmed: true
  special_user_file:
    foreground: "#E8A87C"
    is_bold: true
  special_other:
    foreground: "#E8A87C"
  attribute:
    foreground: "#FFF0C4"
    is_dimmed: true

size:
  major:
    foreground: "#FFF0C4"
  minor:
    foreground: "#FFF0C4"
    is_dimmed: true
  number_byte:
    foreground: "#FFF0C4"
  unit_byte:
    foreground: "#FFF0C4"
    is_dimmed: true
  number_kilo:
    foreground: "#FFF0C4"
  unit_kilo:
    foreground: "#FFF0C4"
    is_dimmed: true
  number_mega:
    foreground: "#E8A87C"
  unit_mega:
    foreground: "#E8A87C"
    is_dimmed: true
  number_giga:
    foreground: "#E05C5C"
    is_bold: true
  unit_giga:
    foreground: "#E05C5C"
    is_bold: true
    is_dimmed: true
  number_huge:
    foreground: "#E05C5C"
    is_bold: true
  unit_huge:
    foreground: "#E05C5C"
    is_bold: true
    is_dimmed: true
  none:
    foreground: "#FFF0C4"
