# --- General Settings ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Key Bindings ---
bind -n S-Left previous-window
bind -n S-Right next-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Red Theme ---
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-left "#[bg=#8b0000,fg=white,bold] #S "
set -g status-right "#[bg=#8b0000,fg=white,bold] %H:%M "

setw -g window-status-current-style bg="#8b0000",fg=white,bold
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style bg=default,fg=white
setw -g window-status-format ' #I:#W '

set -g pane-border-style fg="#ff0000"
set -g pane-active-border-style fg="#ff5555"
set -g message-style bg="#8b0000",fg=white,bold
setw -g mode-style bg="#8b0000",fg=white,bold